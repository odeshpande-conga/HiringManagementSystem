<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job - HireFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand"><a href="/" style="color:inherit;text-decoration:none;">HireFlow</a></div>
        <div class="nav-links">
            <a href="/pages/jobs.html">Jobs</a>
            <a href="/pages/candidate-dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()" style="color:var(--danger);">Logout</a>
        </div>
    </nav>

    <div class="form-container" style="max-width:520px;">
        <h2>Apply for Job</h2>
        <p class="form-subtitle">Submit your application and stand out from the crowd</p>
        <div id="alert" class="alert" style="display:none;"></div>
        <form id="applyForm">
            <div class="form-group">
                <label>Job ID</label>
                <input type="number" id="jobId" placeholder="Enter the Job ID" required>
            </div>
            <div class="form-group">
                <label>Cover Letter</label>
                <textarea id="coverLetter" rows="6" placeholder="Tell the recruiter why you're a great fit for this role..."></textarea>
            </div>
            <div class="form-group">
                <label>Upload Resume</label>
                <input type="file" id="resume" accept=".pdf,.doc,.docx" style="padding:10px;">
            </div>
            <button type="submit" class="btn-primary">Submit Application →</button>
        </form>
    </div>

    <div class="footer">© 2026 HireFlow — Hiring Management System</div>

    <script src="/js/app.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('jobId')) document.getElementById('jobId').value = params.get('jobId');

        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const jobId = document.getElementById('jobId').value;
            const coverLetter = document.getElementById('coverLetter').value;
            const result = await applyForJob(parseInt(jobId), coverLetter);
            const alert = document.getElementById('alert');
            alert.className = result.success ? 'alert alert-success' : 'alert alert-error';
            alert.textContent = result.success ? '✅ Application submitted successfully!' : ('❌ ' + (result.message || 'Something went wrong.'));
            alert.style.display = 'block';
            if (result.success) document.getElementById('applyForm').reset();
        });
    </script>
</body>
</html>
