<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Listings - HireFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand"><a href="/" style="color:inherit;text-decoration:none;">HireFlow</a></div>
        <div class="nav-links">
            <a href="/pages/jobs.html">Jobs</a>
            <a href="/pages/candidate-dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">🔍 Job Listings</h1>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by title, company, or keywords...">
            <button onclick="doSearch()" class="btn-primary" style="width:auto;">Search</button>
            <input type="text" id="locationInput" placeholder="Filter by location...">
            <button onclick="doFilter()" class="btn-success" style="width:auto;">Filter</button>
        </div>

        <div class="grid" id="jobsGrid">
            <div class="card" style="text-align:center; grid-column:1/-1; padding:3rem;">
                <div class="loading"></div>
                <p style="margin-top:1rem; color:var(--gray-400);">Loading jobs...</p>
            </div>
        </div>
    </div>

    <div class="footer">© 2026 HireFlow — Hiring Management System</div>

    <script src="/js/app.js"></script>
    <script>
        async function loadJobs() {
            const result = await getAllJobs();
            if (result.success) renderJobs(result.data);
            else document.getElementById('jobsGrid').innerHTML = '<div class="card" style="text-align:center;grid-column:1/-1;padding:3rem;"><p style="color:var(--gray-500);">No jobs available at the moment. Check back later!</p></div>';
        }

        function renderJobs(jobs) {
            const grid = document.getElementById('jobsGrid');
            if (!jobs || jobs.length === 0) {
                grid.innerHTML = '<div class="card" style="text-align:center;grid-column:1/-1;padding:3rem;"><p style="color:var(--gray-500);">No jobs found matching your criteria.</p></div>';
                return;
            }
            grid.innerHTML = jobs.map(job => `
                <div class="card">
                    <h3>${job.title}</h3>
                    <p style="font-weight:600; color:var(--gray-700); margin-bottom:4px;">${job.company || 'Company'}</p>
                    <div class="job-meta">
                        <span>📍 ${job.location || 'Remote'}</span>
                        <span>💰 ${job.salary || 'Competitive'}</span>
                    </div>
                    <p style="margin:12px 0;">${job.description ? job.description.substring(0, 120) + '...' : 'No description provided.'}</p>
                    <div style="display:flex; align-items:center; justify-content:space-between; margin-top:16px;">
                        <span class="badge">${job.type || 'Full Time'}</span>
                        <button class="btn-primary" style="width:auto; padding:8px 18px; font-size:0.85rem;" onclick="apply(${job.id})">Apply Now →</button>
                    </div>
                </div>
            `).join('');
        }

        async function doSearch() {
            const keyword = document.getElementById('searchInput').value;
            const result = await searchJobs(keyword);
            if (result.success) renderJobs(result.data);
        }

        async function doFilter() {
            const location = document.getElementById('locationInput').value;
            const result = await filterJobsByLocation(location);
            if (result.success) renderJobs(result.data);
        }

        async function apply(jobId) {
            const coverLetter = prompt('Enter a brief cover letter (optional):');
            const result = await applyForJob(jobId, coverLetter || '');
            if (result.success) {
                alert('✅ ' + result.message);
            } else {
                alert('❌ ' + (result.message || 'Failed to apply. Please login first.'));
            }
        }

        loadJobs();
    </script>
</body>
</html>
