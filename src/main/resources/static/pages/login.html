<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HireFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand"><a href="/" style="color:inherit;text-decoration:none;">HireFlow</a></div>
        <div class="nav-links">
            <a href="/pages/login.html">Login</a>
            <a href="/pages/register.html" class="btn">Register</a>
        </div>
    </nav>

    <div class="form-container">
        <h2>Welcome back</h2>
        <p class="form-subtitle">Sign in to your account to continue</p>
        <div id="alert" class="alert" style="display:none;"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <p style="text-align:center; margin-top:1.5rem; color:var(--gray-500); font-size:0.9rem;">
            Don't have an account? <a href="/pages/register.html">Create one here</a>
        </p>
    </div>

    <div class="footer">© 2026 HireFlow — Hiring Management System</div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = await login(email, password);
            if (!result.success) {
                const alert = document.getElementById('alert');
                alert.className = 'alert alert-error';
                alert.textContent = result.message || 'Invalid credentials. Please try again.';
                alert.style.display = 'block';
            }
        });
    </script>
</body>
</html>
