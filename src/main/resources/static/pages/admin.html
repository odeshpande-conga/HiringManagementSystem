<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - HireFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="brand"><a href="/" style="color:inherit;text-decoration:none;">HireFlow</a></div>
        <div class="nav-links">
            <a href="/pages/jobs.html">Jobs</a>
            <a href="/pages/admin.html">Admin</a>
            <a href="#" onclick="logout()" style="color:var(--danger);">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">⚙️ Admin Panel</h1>

        <div class="dashboard-stats">
            <div class="stat-card">
                <h4>Total Users</h4>
                <div class="number" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h4>Candidates</h4>
                <div class="number" id="candidates" style="color:var(--secondary);">0</div>
            </div>
            <div class="stat-card">
                <h4>Recruiters</h4>
                <div class="number" id="recruiters" style="color:var(--success);">0</div>
            </div>
            <div class="stat-card">
                <h4>Total Jobs</h4>
                <div class="number" id="totalJobs" style="color:var(--warning);">0</div>
            </div>
        </div>

        <div class="section-header">
            <h2>All Users</h2>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Registered</th><th>Action</th></tr>
                </thead>
                <tbody id="usersTable">
                    <tr><td colspan="6" style="text-align:center; padding:2rem; color:var(--gray-400);">Loading users...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer">© 2026 HireFlow — Hiring Management System</div>

    <script src="/js/app.js"></script>
    <script>
        function getRoleBadge(role) {
            const map = {
                'ADMIN': 'badge badge-danger',
                'RECRUITER': 'badge badge-success',
                'CANDIDATE': 'badge'
            };
            return map[role] || 'badge';
        }

        async function loadAdmin() {
            const result = await apiCall('GET', '/admin/users');
            if (result.success) {
                const users = result.data;
                document.getElementById('totalUsers').textContent = users.length;
                document.getElementById('candidates').textContent = users.filter(u => u.role === 'CANDIDATE').length;
                document.getElementById('recruiters').textContent = users.filter(u => u.role === 'RECRUITER').length;

                document.getElementById('usersTable').innerHTML = users.map(u => `
                    <tr>
                        <td>${u.id}</td>
                        <td><strong>${u.fullName}</strong></td>
                        <td>${u.email}</td>
                        <td><span class="${getRoleBadge(u.role)}">${u.role}</span></td>
                        <td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'N/A'}</td>
                        <td><button class="btn-danger" onclick="deleteUser(${u.id})">Delete</button></td>
                    </tr>
                `).join('');
            }

            const jobsResult = await getAllJobs();
            if (jobsResult.success) document.getElementById('totalJobs').textContent = jobsResult.data.length;
        }

        async function deleteUser(id) {
            if (confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
                const result = await apiCall('DELETE', '/admin/users/' + id);
                if (result.success) alert('✅ User deleted successfully.');
                else alert('❌ ' + result.message);
                loadAdmin();
            }
        }

        loadAdmin();
    </script>
</body>
</html>
