spring.application.name=${APP_NAME:hiring-management-system}
server.port=${SERVER_PORT:5000}

# Database
spring.datasource.url=${DB_URL:jdbc:h2:mem:hiringdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

# JPA
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=${DB_SHOW_SQL:true}

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForHiringManagementSystem12345678}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# Active Profile (set via env: SPRING_PROFILES_ACTIVE=azure)
# spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
